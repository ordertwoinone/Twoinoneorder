<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ea580c" />
  <title>You're offline — Two In One</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px calc(24px + env(safe-area-inset-right)) calc(24px + env(safe-area-inset-bottom)) calc(24px + env(safe-area-inset-left));
      text-align: center;
    }
    .wrap { max-width: 360px; }
    .logo { width: 84px; height: 84px; margin: 0 auto 20px; }
    .logo img { width: 100%; height: 100%; object-fit: contain; }
    h1 { font-size: 22px; font-weight: 800; margin: 0 0 8px; }
    p { font-size: 14px; line-height: 1.6; color: #6b7280; margin: 0 0 24px; }
    button {
      appearance: none; border: 0; cursor: pointer;
      background: #ea580c; color: #fff;
      font-size: 15px; font-weight: 700;
      padding: 13px 28px; border-radius: 9999px;
      box-shadow: 0 6px 18px rgba(234, 88, 12, 0.35);
      transition: transform .12s ease;
    }
    button:active { transform: scale(0.96); }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ef4444; margin-right: 6px; vertical-align: middle; }
    .status { font-size: 12px; color: #9ca3af; margin-top: 18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo"><img src="/logos/two-in-one.png" alt="Two In One" /></div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your connection. Check your network and try again — your saved pages are still available.</p>
    <button onclick="location.reload()">Try again</button>
    <p class="status"><span class="dot"></span>No internet connection</p>
  </div>
  <script>
    window.addEventListener("online", function () { location.reload(); });
  </script>
</body>
</html>
